<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" width="300" height="80">
  <defs>
    <!-- Gold Gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3e7c4" />
      <stop offset="30%" stop-color="#c9a84c" />
      <stop offset="70%" stop-color="#a1812c" />
      <stop offset="100%" stop-color="#f3e7c4" />
    </linearGradient>
    
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Ornate Filigree / Wings (Left Side) -->
  <path d="M 120 40 
           C 100 25, 80 20, 60 40 
           C 45 55, 30 40, 15 40 
           C 30 35, 45 20, 60 30 
           C 75 40, 95 35, 110 38" 
        fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" />
  
  <path d="M 115 45 
           C 95 35, 75 35, 55 50 
           C 40 60, 25 55, 10 50 
           C 25 45, 40 35, 55 42 
           C 70 50, 90 45, 105 45" 
        fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />

  <!-- Ornate Filigree / Wings (Right Side) -->
  <path d="M 180 40 
           C 200 25, 220 20, 240 40 
           C 255 55, 270 40, 285 40 
           C 270 35, 255 20, 240 30 
           C 225 40, 205 35, 190 38" 
        fill="none" stroke="url(#gold)" stroke-width="2" stroke-linecap="round" />
  
  <path d="M 185 45 
           C 205 35, 225 35, 245 50 
           C 260 60, 275 55, 290 50 
           C 275 45, 260 35, 245 42 
           C 230 50, 210 45, 195 45" 
        fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.8" />

  <!-- Center Gold Brooch Frame (Solid Gold with filigree, no emerald) -->
  <ellipse cx="150" cy="40" rx="18" ry="24" fill="url(#gold)" filter="url(#glow)" />
  
  <!-- Outer Gold Rope Detail -->
  <ellipse cx="150" cy="40" rx="15" ry="21" fill="none" stroke="#1e2238" stroke-width="1.5" stroke-dasharray="3,3" />

  <!-- Inner Gold Ridge -->
  <ellipse cx="150" cy="40" rx="12" ry="18" fill="url(#gold)" stroke="#a1812c" stroke-width="1" />
  
  <!-- Center Star Motif -->
  <path d="M 150 32 L 152 38 L 158 40 L 152 42 L 150 48 L 148 42 L 142 40 L 148 38 Z" fill="#ffffff" opacity="0.9" />
</svg>
